/* ── Design Tokens ─────────────────────────────────────────────── */
:root{

h1,h2,h3,.serif{font-family:'Playfair Display',serif;}
body{background:var(--gd);color:var(--tx);overflow-x:hidden;}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInFast{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes alertSlide{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes ping{0%{transform:scale(1);opacity:1}75%,100%{transform:scale(2.2);opacity:0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

<!-- ── Global error guard: catches any script crash → visible fallback, never blank ── -->
<script>
(function(){
  function _showFatalError(msg){
    var splash=document.getElementById('kv-splash');
    if(splash){
      splash.innerHTML=
        '<div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:32px;">'
        +'<div style="font-size:48px;">⚠️</div>'
        +'<div style="font-size:18px;color:#e8f5ef;font-weight:600;">Something went wrong</div>'
        +'<div style="font-size:13px;color:#9dbfad;max-width:280px;line-height:1.6;">'+msg+'</div>'
        +'<button onclick="window.location.reload()" style="'
        +'margin-top:8px;padding:12px 28px;background:linear-gradient(135deg,#22c55e,#16a34a);'
        +'color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;">Retry</button>'
        +'</div>';
    }
  }
  window.addEventListener('error',function(e){
    // Ignore CDN sub-resource failures handled individually below
    if(e&&e.target&&e.target.tagName==='SCRIPT'&&(e.target.src||'').includes('cdnjs')){return;}
    if(e&&e.message&&e.message.toLowerCase().indexOf('script error')>-1){return;}
    console.error('[KV] Uncaught error:',e.message);
  });
  window.addEventListener('unhandledrejection',function(e){
    console.error('[KV] Unhandled promise rejection:',e.reason);
  });
  // Expose helper so CDN onerror callbacks can call it
  window._kvFatalError=_showFatalError;
})();
</script>

<!-- Firebase v10 ES module -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,collection,addDoc,setDoc,updateDoc,deleteDoc,
  doc,query,orderBy,where,limit,onSnapshot,serverTimestamp,
  getDocs,getDoc,increment,Timestamp,
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getAuth,GoogleAuthProvider,signInWithPopup,signInWithRedirect,
  getRedirectResult,signOut,onAuthStateChanged,
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ── Firebase init ──────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyC4YGX93KeHyFFzUuqMLMDRmOuYfmKIq3w",
  authDomain:        "karunada-vanya-f1c10.firebaseapp.com",
  projectId:         "karunada-vanya-f1c10",
  storageBucket:     "karunada-vanya-f1c10.firebasestorage.app",
  messagingSenderId: "369967972894",
  appId:             "1:369967972894:web:456935f8fbfd7337e8e40f",
  measurementId:     "G-VB735XKJ3R",
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const auth = getAuth(app);
const googleProvider = new GoogleAuthProvider();
googleProvider.addScope("profile");
googleProvider.addScope("email");

const ADMIN_EMAIL = "karthiikkp2002@gmail.com";

const COL = {
  REPORTS:   "wildlife_reports",
  USERS:     "users",
  ALERTS:    "emergency_alerts",
  FOREST:    "forest_updates",
  LOGS:      "admin_logs",
  LEARNING:  "learning_modules",
  PROGRESS:  "learning_progress",
  COMMENTS:  "report_comments",
  STATUS_LOGS:"report_status_logs",
  BOOKMARKS: "learning_bookmarks",
};

async function _log(action, targetId, actorUid, meta={}) {
  try { await addDoc(collection(db, COL.LOGS), { action,targetId,actorUid,meta,createdAt:serverTimestamp() }); } catch {}
}

// ── Auth ──────────────────────────────────────────────────────────────
// Detect Android WebView — popup auth won't work there, use redirect
function _isAndroidWebView() {
  const ua = navigator.userAgent || "";
  return (ua.includes("Android") && (ua.includes(" wv)") || !ua.includes("Chrome/")));
}

async function _upsertProfile(u) {
  const userRef = doc(db, COL.USERS, u.uid);
  const snap    = await getDoc(userRef);
  const role    = u.email === ADMIN_EMAIL ? "admin" : "public";
  if (!snap.exists()) {
    await setDoc(userRef, {
      uid: u.uid, displayName: u.displayName||"Wildlife Guardian",
      email: u.email, photoURL: u.photoURL||null,
      role, reportsCount:0, bookmarks:[],
      createdAt: serverTimestamp(), lastLoginAt: serverTimestamp(),
    });
  } else {
    const updates = { lastLoginAt: serverTimestamp() };
    if (u.email === ADMIN_EMAIL && snap.data().role !== "admin") updates.role = "admin";
    await updateDoc(userRef, updates);
  }
  return u;
}

async function signInGoogle() {
  try {
    if (_isAndroidWebView()) {
      // In Android WebView, neither signInWithPopup nor signInWithRedirect work
      // because Google blocks OAuth flows inside embedded WebViews for security.
      // We surface a clear error so the user is never silently stuck.
      throw Object.assign(new Error(
        "Google Sign-In is not supported inside this app's WebView. " +
        "This is a Google security restriction. Anonymous reporting still works."
      ), { code: "auth/webview-not-supported" });
    }
    const result = await signInWithPopup(auth, googleProvider);
    return await _upsertProfile(result.user);
  } catch(e) {
    if (e.code === "auth/popup-closed-by-user" ||
        e.code === "auth/cancelled-popup-request") return null;
    throw e;
  }
}
async function signOutUser() { await signOut(auth); }

// getRedirectResult is a no-op in WebView (redirect flow not used) but kept
// here as a safety call for browser contexts.
(async () => {
  try {
    const result = await getRedirectResult(auth);
    if (result?.user) await _upsertProfile(result.user);
  } catch {}
})();

// ── Reports ───────────────────────────────────────────────────────────
async function submitReport(data, user) {
  const payload = {
    animalId:     data.animalId||"unknown",
    animalName:   data.animalName||"Unknown",
    animalEmoji:  data.animalEmoji||"🐾",
    severity:     data.severity||"medium",
    zone:         data.zone||"",
    description:  data.description||"",
    imageURL:     data.imageURL||null,
    location:     data.location||"Karnataka",
    district:     data.district||"Unknown",
    placeName:    data.placeName||"",
    latitude:     data.latitude||null,
    longitude:    data.longitude||null,
    uid:          user?.uid||null,
    reporterName: user?.displayName||"Anonymous",
    reporterEmail:user?.email||null,
    status:       "pending",
    verified:     false,
    verifiedBy:   null,
    verifiedAt:   null,
    createdAt:    serverTimestamp(),
    updatedAt:    serverTimestamp(),
  };
  const ref = await addDoc(collection(db, COL.REPORTS), payload);
  if (user?.uid) {
    try { await updateDoc(doc(db,COL.USERS,user.uid),{reportsCount:increment(1)}); } catch{}
  }
  await addDoc(collection(db,COL.STATUS_LOGS),{
    reportId:ref.id, status:"pending", action:"submitted",
    actorUid:user?.uid||"anon", actorName:user?.displayName||"Anonymous",
    createdAt:serverTimestamp()
  });
  await _log("report_submitted",ref.id,user?.uid||"anon",{animalName:payload.animalName,severity:payload.severity});
  return ref.id;
}
async function updateReport(id, updates, uid) {
  await updateDoc(doc(db,COL.REPORTS,id),{...updates,updatedAt:serverTimestamp()});
  await _log("report_updated",id,uid||"anon",updates);
}
function listenReports(filters, cb) {
  try {
    const constraints = [orderBy("createdAt","desc")];
    if (filters.severity) constraints.unshift(where("severity","==",filters.severity));
    if (filters.district) constraints.unshift(where("district","==",filters.district));
    if (filters.status)   constraints.unshift(where("status","==",filters.status));
    if (filters.uid)      constraints.unshift(where("uid","==",filters.uid));
    if (filters.verified !== undefined) constraints.unshift(where("verified","==",filters.verified));
    constraints.push(limit(filters.limitCount||60));
    const q = query(collection(db,COL.REPORTS),...constraints);
    return onSnapshot(q, snap=>{
      cb(snap.docs.map(d=>({id:d.id,...d.data(),
        createdAt:d.data().createdAt?.toMillis?.()||Date.now(),
        updatedAt:d.data().updatedAt?.toMillis?.()||Date.now(),
      })),null);
    }, err=>cb([],err));
  } catch(err) { cb([],err); return()=>{}; }
}
async function adminUpdateReport(id,updates,adminUid) {
  const extra = {};
  if (updates.verified === true) { extra.verifiedBy=adminUid; extra.verifiedAt=serverTimestamp(); }
  await updateDoc(doc(db,COL.REPORTS,id),{...updates,...extra,updatedAt:serverTimestamp()});
  await addDoc(collection(db,COL.STATUS_LOGS),{
    reportId:id, ...updates, actorUid:adminUid,
    action:"admin_update", createdAt:serverTimestamp()
  });
  await _log("admin_update",id,adminUid,updates);
}
async function deleteReport(id,adminUid) {
  await deleteDoc(doc(db,COL.REPORTS,id));
  await _log("report_deleted",id,adminUid);
}

// ── Alerts ────────────────────────────────────────────────────────────
function listenAlerts(cb) {
  try {
    const now = Timestamp.now();
    const q = query(collection(db,COL.ALERTS),
      where("status","==","active"),where("expiresAt",">",now),
      orderBy("expiresAt","asc"),limit(20));
    return onSnapshot(q, snap=>{
      const pw={critical:4,high:3,medium:2,low:1};
      const alerts=snap.docs.map(d=>({id:d.id,...d.data(),
        createdAt:d.data().createdAt?.toMillis?.()||Date.now(),
        expiresAt:d.data().expiresAt?.toMillis?.()||0,
      })).sort((a,b)=>{
        const diff=(pw[b.priority]||1)-(pw[a.priority]||1);
        return diff!==0?diff:b.createdAt-a.createdAt;
      });
      cb(alerts);
    },()=>cb([]));
  } catch { cb([]); return()=>{}; }
}
async function createAlert(data, user) {
  const expiresAtMs=Date.now()+(data.expiryHours||12)*3600000;
  const ref=await addDoc(collection(db,COL.ALERTS),{
    title:data.title||"Alert", message:data.message||"",
    priority:data.priority||"high", district:data.district||"Statewide",
    animalEmoji:data.animalEmoji||"⚠️", status:"active",
    createdBy:user.uid, createdByName:user.displayName||"Admin",
    createdAt:serverTimestamp(), expiresAt:Timestamp.fromMillis(expiresAtMs), updatedAt:serverTimestamp(),
  });
  await _log("alert_created",ref.id,user.uid);
  return ref.id;
}
async function resolveAlert(id,uid) {
  await updateDoc(doc(db,COL.ALERTS,id),{status:"resolved",resolved:true,resolvedBy:uid,updatedAt:serverTimestamp()});
  await _log("alert_resolved",id,uid);
}

// ── Forest updates ────────────────────────────────────────────────────
function listenForestUpdates(cb, category) {
  try {
    const constraints=[orderBy("createdAt","desc"),limit(30)];
    if(category) constraints.unshift(where("category","==",category));
    return onSnapshot(query(collection(db,COL.FOREST),...constraints),snap=>{
      cb(snap.docs.map(d=>({id:d.id,...d.data(),createdAt:d.data().createdAt?.toMillis?.()||Date.now()})));
    },()=>cb([]));

    category:data.category||"conservation", district:data.district||"Statewide",
    imageURL:data.imageURL||null, tags:data.tags||[],
    authorUid:user.uid, authorName:user.displayName||"Admin",
    views:0, likes:0, createdAt:serverTimestamp(), updatedAt:serverTimestamp(),

  await _log("forest_update_posted",ref.id,user.uid);

async function deleteForestUpdate(id,uid) {
  await deleteDoc(doc(db,COL.FOREST,id));
  await _log("forest_update_deleted",id,uid);

// ── Learning modules ──────────────────────────────────────────────────
function listenLearningModules(cb, filters={}) {
  try {
    const constraints=[orderBy("sortOrder","asc"),limit(50)];
    if(filters.category) constraints.unshift(where("category","==",filters.category));
    if(filters.featured) constraints.unshift(where("featured","==",true));
    return onSnapshot(query(collection(db,COL.LEARNING),...constraints),snap=>{
      cb(snap.docs.map(d=>({id:d.id,...d.data(),createdAt:d.data().createdAt?.toMillis?.()||Date.now()})));
    },()=>cb([]));
  } catch { cb([]); return()=>{}; }
}
async function getLearningModule(id) {
  const snap=await getDoc(doc(db,COL.LEARNING,id));
  return snap.exists()?{id:snap.id,...snap.data()}:null;
}
async function saveLearningModule(data, user, existingId=null) {
  const payload = {
    title:data.title||"Module", summary:data.summary||"",
    content:data.content||"", category:data.category||"wildlife",
    difficulty:data.difficulty||"beginner", duration:data.duration||5,
    emoji:data.emoji||"📚", imageEmoji:data.imageEmoji||"🌿",
    tags:data.tags||[], district:data.district||"Statewide",
    featured:data.featured||false, published:data.published!==false,
    sortOrder:data.sortOrder||99, facts:data.facts||[],
    authorUid:user.uid, authorName:user.displayName||"Admin",
    updatedAt:serverTimestamp(),
  };
  if (existingId) {
    await updateDoc(doc(db,COL.LEARNING,existingId),payload);
    return existingId;
  } else {
    payload.createdAt=serverTimestamp();
    payload.viewCount=0;
    const ref=await addDoc(collection(db,COL.LEARNING),payload);
    return ref.id;
  }
}
async function deleteLearningModule(id,uid) {
  await deleteDoc(doc(db,COL.LEARNING,id));
  await _log("module_deleted",id,uid);
}

// ── Progress tracking ─────────────────────────────────────────────────
async function markProgress(uid, moduleId, pct) {
  if(!uid) return;
  const key=`${uid}_${moduleId}`;
  await setDoc(doc(db,COL.PROGRESS,key),{
    uid, moduleId, pct, updatedAt:serverTimestamp()
  },{merge:true});
}
async function getUserProgress(uid) {
  if(!uid) return {};
  const snap=await getDocs(query(collection(db,COL.PROGRESS),where("uid","==",uid)));
  const map={};
  snap.docs.forEach(d=>{ map[d.data().moduleId]=d.data().pct||0; });
  return map;
}
async function toggleBookmark(uid, moduleId, isBookmarked) {
  if(!uid) return;
  const userRef=doc(db,COL.USERS,uid);
  const snap=await getDoc(userRef);
  if(!snap.exists()) return;
  const bookmarks=snap.data().bookmarks||[];
  const updated=isBookmarked?bookmarks.filter(b=>b!==moduleId):[...bookmarks,moduleId];
  await updateDoc(userRef,{bookmarks:updated});
  return updated;
}

// ── Dashboard stats ───────────────────────────────────────────────────
function listenDashboardStats(cb) {
  return onSnapshot(
    query(collection(db,COL.REPORTS),orderBy("createdAt","desc"),limit(200)),
    snap=>{
      const reports=snap.docs.map(d=>({...d.data()}));
      const districtMap={};
      for(const r of reports){
        const d=r.district||"Unknown";
        if(!districtMap[d]) districtMap[d]={district:d,total:0,critical:0,active:0,verified:0,animals:new Set()};
        districtMap[d].total++;
        if(r.severity==="critical") districtMap[d].critical++;
        if(r.status==="active")     districtMap[d].active++;
        if(r.verified)              districtMap[d].verified++;
        if(r.animalName) districtMap[d].animals.add(r.animalName);
      }
      const districts=Object.values(districtMap)
        .map(d=>({...d,animals:[...d.animals]}))
        .sort((a,b)=>b.total-a.total);
      cb({
        total:reports.length, active:reports.filter(r=>r.status==="active").length,
        verified:reports.filter(r=>r.verified).length, critical:reports.filter(r=>r.severity==="critical").length,
        pending:reports.filter(r=>r.status==="pending").length, districts,
      });
    },()=>{}
  );
}
function exportCSV(reports) {
  const headers=["ID","Animal","Severity","Zone","District","Place","Description","Status","Verified","Reporter","Lat","Lng","Created"];
  const rows=reports.map(r=>[
    r.id,r.animalName,r.severity,r.zone,r.district,r.placeName||r.location||"",
    `"${(r.description||"").replace(/"/g,'""')}"`,r.status,r.verified?"Yes":"No",
    r.reporterName,r.latitude||"",r.longitude||"",new Date(r.createdAt).toLocaleString("en-IN"),
  ]);
  const csv=[headers,...rows].map(r=>r.join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
  a.download=`kv-reports-${Date.now()}.csv`;a.click();URL.revokeObjectURL(a.href);
}

// ── Utilities ─────────────────────────────────────────────────────
function timeAgo(ms){
  const m=Math.max(0,Math.floor((Date.now()-ms)/60000));
  if(m<1)return'Just now';if(m<60)return`${m}m ago`;
  const hr=Math.floor(m/60);if(hr<24)return`${hr}h ago`;
  return`${Math.floor(hr/24)}d ago`;
}
function capFirst(s){return s?s[0].toUpperCase()+s.slice(1):s;}
function fmtDuration(min){return min>=60?`${Math.floor(min/60)}h ${min%60?min%60+'m':''}`.trim():`${min} min`;}

// ── Toast ──────────────────────────────────────────────────────────
function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,3200);return()=>clearTimeout(t);},[]);
  return h('div',{className:`toast${type==='error'?' error':''}`},
    h('span',{},type==='error'?'❌':'✅'),msg);
}
function Spinner({size=20}){return h('div',{className:'spinner',style:{width:size,height:size}});}
function useToast(){
  const[toast,setToast]=useState(null);
  const show=(msg,type='success')=>setToast({msg,type,key:Date.now()});
  const clear=()=>setToast(null);
  return{toast,show,clear};
}

// ── useAuth ────────────────────────────────────────────────────────
function useAuth(){
  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);

  useEffect(()=>{
    const poll=setInterval(()=>{
      if(window.KV){
        clearInterval(poll);
        clearTimeout(kvTimeout);
        const unsub=window.KV.onAuthStateChanged(window.KV.auth,async fireUser=>{
          setUser(fireUser);
          if(fireUser){
            try{
              const snap=await window.KV.getDoc(window.KV.doc(window.KV.db,"users",fireUser.uid));
              if(snap.exists()){
                setProfile(snap.data());
                // Seed learning modules on first admin login
                if(snap.data().role==='admin'){
                  window.KV.seedLearningModules(fireUser.uid,fireUser.displayName||"Admin").catch(()=>{});
                }
              } else setProfile(null);
            }catch{setProfile(null);}
          } else setProfile(null);
          setAuthLoading(false);
        });
        window._kvAuthUnsub=unsub;
      }
    },100);
    // Safety timeout — if Firebase never loads (offline/CDN fail), unblock the app after 8 s
    const kvTimeout=setTimeout(()=>{
      clearInterval(poll);
      setAuthLoading(false);
    },8000);
    return()=>{clearInterval(poll);clearTimeout(kvTimeout);window._kvAuthUnsub?.();};
  },[]);

  const[authError,setAuthError]=useState(null);
  const signIn=async()=>{
    if(!window.KV)return;
    setAuthError(null);
    try{
      await window.KV.signInGoogle();
    }catch(e){
      console.error(e);
      setAuthError(e.message||'Sign-in failed');
    }
  };
  const signOut=async()=>{if(!window.KV)return;await window.KV.signOutUser();setUser(null);setProfile(null);};

  return{
    user,profile,authLoading,authError,signIn,signOut,
    isAdmin:profile?.role==='admin',
    isRanger:profile?.role==='ranger'||profile?.role==='admin',
  };
}

function useOnline(){
  const[online,setOnline]=useState(navigator.onLine);
  useEffect(()=>{
    const on=()=>setOnline(true),off=()=>setOnline(false);
    window.addEventListener('online',on);window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[]);
  return online;
}

// ── ReportModal ────────────────────────────────────────────────────
function ReportModal({user,onClose,onSuccess,editReport}){
  const isEdit=!!editReport;
  const[form,setForm]=useState(isEdit?{
    animalId:editReport.animalId||'tiger',
    severity:editReport.severity||'high',
    zone:editReport.zone||'Near Forest Edge',
    district:editReport.district||'Mysuru',
    placeName:editReport.placeName||'',
    description:editReport.description||'',
  }:{animalId:'tiger',severity:'high',zone:'Near Forest Edge',district:'Mysuru',placeName:'',description:''});
  const[saving,setSaving]=useState(false);
  const[imgFile,setImgFile]=useState(null);
  const toast=useToast();
  const fileRef=useRef();

  function set(k,v){setForm(f=>({...f,[k]:v}));}
  const animal=DANGEROUS_ANIMALS.find(a=>a.id===form.animalId)||DANGEROUS_ANIMALS[0];

  // Simple base64 image encode for storage (no Firebase Storage needed)
  async function encodeImage(file){
    return new Promise(res=>{
      const reader=new FileReader();
      reader.onload=e=>res(e.target.result);
      reader.readAsDataURL(file);
    });
  }

  async function handleSubmit(){
    if(!form.description.trim()){toast.show('Please describe the sighting','error');return;}
    if(!window.KV){toast.show('Firebase not ready','error');return;}
    setSaving(true);
    try{
      let lat=null,lng=null;
      try{
        const pos=await new Promise((res,rej)=>
          navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000}));
        lat=pos.coords.latitude;lng=pos.coords.longitude;
      }catch{}
      let imageURL=isEdit?editReport.imageURL:null;
      if(imgFile){
        // Store small base64 preview (first 50kb)
        try{imageURL=await encodeImage(imgFile);}catch{}
      }
      if(isEdit){
        await window.KV.updateReport(editReport.id,{
          animalId:form.animalId,animalName:animal.name,animalEmoji:animal.emoji,
          severity:form.severity,zone:form.zone,district:form.district,
          placeName:form.placeName,description:form.description,imageURL,
        },user?.uid);
        onSuccess?.('updated');
      } else {
        await window.KV.submitReport({
          animalId:form.animalId,animalName:animal.name,animalEmoji:animal.emoji,
          severity:form.severity,zone:form.zone,district:form.district,
          placeName:form.placeName,description:form.description,
          latitude:lat,longitude:lng,location:form.district,imageURL,
        },user);
        onSuccess?.('submitted');
      }
      onClose();
    }catch(e){toast.show(e.message||'Failed','error');}
    finally{setSaving(false);}
  }

  return h('div',{className:'modal-overlay',onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{className:'modal-sheet'},
      h('div',{style:{width:40,height:4,background:'rgba(255,255,255,0.15)',borderRadius:2,margin:'0 auto 20px'}}),
      h('h2',{style:{fontFamily:'Playfair Display,serif',fontSize:'20px',color:'var(--tx)',marginBottom:4}},
        isEdit?'✏️ Edit Report':'🚨 Report Wildlife Sighting'),
      h('p',{style:{fontSize:'12px',color:'var(--tx3)',marginBottom:20}},
        user?`${isEdit?'Editing':'Reporting'} as ${user.displayName}`:'Anonymous (sign in to track your reports)'),

      // Animal grid
      h('div',{style:{marginBottom:16}},
        h('label',{style:{fontSize:'12px',color:'var(--tx3)',marginBottom:6,display:'block'}},'Animal Spotted'),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5}},
          DANGEROUS_ANIMALS.map(a=>h('button',{key:a.id,onClick:()=>set('animalId',a.id),
            style:{background:form.animalId===a.id?`${a.color}22`:'rgba(255,255,255,0.04)',
              border:`1.5px solid ${form.animalId===a.id?a.color:'rgba(255,255,255,0.1)'}`,
              borderRadius:10,padding:'7px 4px',cursor:'pointer',color:'var(--tx)',
              fontSize:'11px',textAlign:'center',transition:'all 0.2s'}},
            h('div',{style:{fontSize:'20px'}},a.emoji),
            h('div',{style:{marginTop:2,lineHeight:'1.2',fontSize:'10px'}},a.name.split(' ')[0])))
        )
      ),

      // Severity
      h('div',{style:{marginBottom:14}},
        h('label',{style:{fontSize:'12px',color:'var(--tx3)',marginBottom:6,display:'block'}},'Severity Level'),
        h('div',{style:{display:'flex',gap:6}},
          ['low','medium','high','critical'].map(s=>h('button',{key:s,onClick:()=>set('severity',s),
            style:{flex:1,padding:'8px 4px',borderRadius:8,cursor:'pointer',
              background:form.severity===s?`${SEVERITY_COLORS[s]}22`:'rgba(255,255,255,0.04)',
              border:`1.5px solid ${form.severity===s?SEVERITY_COLORS[s]:'rgba(255,255,255,0.1)'}`,
              color:form.severity===s?SEVERITY_COLORS[s]:'var(--tx2)',fontSize:'12px',fontWeight:500,transition:'all 0.2s'}},
            capFirst(s)))
        )
      ),

      // Zone + District
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}},
        h('div',null,
          h('label',{style:{fontSize:'12px',color:'var(--tx3)',marginBottom:4,display:'block'}},'Zone'),
          h('select',{className:'kv-input',value:form.zone,onChange:e=>set('zone',e.target.value)},
            ZONES.map(z=>h('option',{key:z,value:z},z)))),
        h('div',null,
          h('label',{style:{fontSize:'12px',color:'var(--tx3)',marginBottom:4,display:'block'}},'District'),
          h('select',{className:'kv-input',value:form.district,onChange:e=>set('district',e.target.value)},
            DISTRICTS.map(d=>h('option',{key:d,value:d},d))))
      ),

      h('div',{style:{marginBottom:14}},
        h('label',{style:{fontSize:'12px',color:'var(--tx3)',marginBottom:4,display:'block'}},'Specific Location / Landmark'),
        h('input',{className:'kv-input',type:'text',placeholder:'e.g. Near Kabini Bridge, Hunsur',
          value:form.placeName,onChange:e=>set('placeName',e.target.value)})
      ),

      h('div',{style:{marginBottom:14}},
        h('label',{style:{fontSize:'12px',color:'var(--tx3)',marginBottom:4,display:'block'}},'Description *'),
        h('textarea',{className:'kv-input',
          placeholder:'Describe what you saw — animal behaviour, number of animals, direction of movement…',
          value:form.description,onChange:e=>set('description',e.target.value)})
      ),

      // Image upload
      h('div',{style:{marginBottom:20}},
        h('label',{style:{fontSize:'12px',color:'var(--tx3)',marginBottom:6,display:'block'}},'📷 Wildlife Photo (optional)'),
        h('div',{onClick:()=>fileRef.current?.click(),style:{
          border:'1px dashed rgba(34,197,94,0.3)',borderRadius:10,padding:'16px',
          textAlign:'center',cursor:'pointer',transition:'all 0.2s',
          background:imgFile?'rgba(34,197,94,0.1)':'rgba(255,255,255,0.03)',
        }},
          imgFile
            ? h('p',{style:{fontSize:'13px',color:'#22c55e'}},'✅ '+imgFile.name)
            : h('p',{style:{fontSize:'12px',color:'var(--tx3)'}},
                isEdit&&editReport?.imageURL?'📸 Photo attached (tap to change)':'📸 Tap to select photo')
        ),
        h('input',{ref:fileRef,type:'file',accept:'image/*',style:{display:'none'},
          onChange:e=>setImgFile(e.target.files[0]||null)})
      ),

      h('p',{style:{fontSize:'11px',color:'var(--tx3)',marginBottom:16}},
        '📍 GPS coordinates captured automatically if location access is granted.'),

      h('button',{className:'kv-btn',onClick:handleSubmit,disabled:saving,
        style:{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:8}},
        saving&&h(Spinner,{size:18}),saving?'Saving…':isEdit?'💾 Save Changes':'🚨 Submit Report'),

      toast.toast&&h(Toast,{key:toast.toast.key,...toast.toast,onDone:toast.clear})
    )
  );
}

        h('p',{style:{fontSize:'12px',color:'#22c55e'}},

          className:'kv-btn ghost sm',onClick:onEdit},'✏️ Edit'),
        user&&r.uid===user.uid&&!r.verified&&h('button',{
          className:'kv-btn danger sm',onClick:onDelete},'🗑 Delete'),
        // Admin/Ranger
        (isAdmin||isRanger)&&!r.verified&&h('button',{

// ── LiveReportsPage ────────────────────────────────────────────────
function LiveReportsPage({user,isAdmin,isRanger,onReport}){
  const[reports,setReports]=useState([]);
  const[loading,setLoading]=useState(true);
  const[filter,setFilter]=useState({severity:'',district:'',status:''});
  const[search,setSearch]=useState('');
  const[page,setPage]=useState(1);
  const[selectedReport,setSelectedReport]=useState(null);
  const[editReport,setEditReport]=useState(null);
  const PER_PAGE=10;
  const toast=useToast();

  useEffect(()=>{
    if(!window.KV){setLoading(false);return;}
    const f={};
    if(filter.severity)f.severity=filter.severity;
    if(filter.district)f.district=filter.district;
    if(filter.status)  f.status=filter.status;
    setLoading(true);
    const unsub=window.KV.listenReports(f,(items,err)=>{
      if(err)toast.show('Failed to load reports','error');
      setReports(items||[]);setLoading(false);
    });
    setPage(1);
    return()=>{if(unsub)unsub();};
  },[filter.severity,filter.district,filter.status]);

  const filtered=useMemo(()=>{
    if(!search.trim())return reports;
    const q=search.toLowerCase();
    return reports.filter(r=>
      r.animalName?.toLowerCase().includes(q)||r.description?.toLowerCase().includes(q)||
      r.district?.toLowerCase().includes(q)||r.placeName?.toLowerCase().includes(q)||
      r.reporterName?.toLowerCase().includes(q)
    );
  },[reports,search]);

  const totalPages=Math.max(1,Math.ceil(filtered.length/PER_PAGE));
  const paginated=filtered.slice((page-1)*PER_PAGE,page*PER_PAGE);

  async function handleVerify(id){
    try{await window.KV.adminUpdateReport(id,{verified:true,status:'active'},user?.uid);
      toast.show('Report verified ✅');setSelectedReport(null);}
    catch(e){toast.show(e.message,'error');}
  }
  async function handleDelete(id){
    if(!confirm('Permanently delete this report?'))return;
    try{await window.KV.deleteReport(id,user?.uid);
      toast.show('Report deleted');setSelectedReport(null);}
    catch(e){toast.show(e.message,'error');}
  }

  return h('div',{style:{padding:'0 0 90px'}},
    // Filter bar
    h('div',{style:{padding:'12px 16px',background:'rgba(10,46,24,0.6)',borderBottom:'1px solid rgba(34,197,94,0.1)'}},
      h('div',{className:'search-wrap',style:{marginBottom:8}},
        h('span',{className:'search-icon'},'🔍'),
        h('input',{className:'kv-input',type:'text',placeholder:'Search reports…',
          value:search,onChange:e=>{setSearch(e.target.value);setPage(1);}})
      ),
      h('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
        h('select',{className:'kv-input',style:{flex:1,minWidth:90},value:filter.severity,
          onChange:e=>setFilter(f=>({...f,severity:e.target.value}))},
          h('option',{value:''},'All Severity'),
          ['critical','high','medium','low'].map(s=>h('option',{key:s,value:s},capFirst(s)))),
        h('select',{className:'kv-input',style:{flex:1,minWidth:100},value:filter.district,
          onChange:e=>setFilter(f=>({...f,district:e.target.value}))},
          h('option',{value:''},'All Districts'),
          DISTRICTS.map(d=>h('option',{key:d,value:d},d))),
        h('select',{className:'kv-input',style:{flex:1,minWidth:90},value:filter.status,
          onChange:e=>setFilter(f=>({...f,status:e.target.value}))},
          h('option',{value:''},'All Status'),
          ['pending','active','resolved'].map(s=>h('option',{key:s,value:s},capFirst(s)))),
        (isAdmin||isRanger)&&h('button',{className:'kv-btn ghost sm',
          onClick:()=>window.KV.exportCSV(reports)},'📥')
      )
    ),

    // Stats bar
    h('div',{style:{padding:'10px 16px 4px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
      h('p',{style:{fontSize:'12px',color:'var(--tx3)'}},
        loading?'Loading…':`${filtered.length} report${filtered.length!==1?'s':''} ${search?'found':'live'}`),
      h('div',{style:{display:'flex',alignItems:'center',gap:6}},
        h('div',{style:{width:8,height:8,borderRadius:'50%',
          background:loading?'#94a3b8':'#22c55e',boxShadow:loading?'none':'0 0 8px #22c55e'}}),
        !loading&&h('span',{style:{fontSize:'10px',color:'#22c55e'}},'LIVE'))
    ),

    h('div',{style:{padding:'0 16px'}},
      loading
        ? h('div',{style:{display:'flex',justifyContent:'center',padding:40}},h(Spinner,{size:32}))
        : paginated.length===0
          ? h('div',{style:{textAlign:'center',padding:'60px 20px',color:'var(--tx3)'}},
              h('div',{style:{fontSize:48,marginBottom:12}},'🌿'),
              h('p',{style:{fontSize:'14px'}},
                search||filter.severity||filter.district||filter.status
                  ?'No reports match your search.':'No reports yet. Be the first to report!'),
              h('button',{className:'kv-btn',onClick:onReport,style:{marginTop:16}},'🚨 Submit Report'))
          : h('div',null,
              paginated.map(r=>h(ReportCard,{key:r.id,report:r,isAdmin,isRanger,user,
                onClick:()=>setSelectedReport(r),
                onVerify:e=>{e.stopPropagation();handleVerify(r.id);},
                onDelete:e=>{e.stopPropagation();handleDelete(r.id);},
                onEdit:e=>{e.stopPropagation();setEditReport(r);},
              })),
              totalPages>1&&h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'8px 0 4px'}},
                h('button',{className:'kv-btn ghost sm',onClick:()=>setPage(p=>Math.max(1,p-1)),disabled:page===1},'← Prev'),
                h('span',{style:{fontSize:'12px',color:'var(--tx3)'}},`${page} / ${totalPages}`),
                h('button',{className:'kv-btn ghost sm',onClick:()=>setPage(p=>Math.min(totalPages,p+1)),disabled:page===totalPages},'Next →')
              )
            )
    ),

    // FAB
    h('button',{className:'kv-btn',onClick:onReport,style:{
      position:'fixed',bottom:80,right:16,borderRadius:50,width:52,height:52,
      fontSize:22,padding:0,display:'flex',alignItems:'center',justifyContent:'center',
      boxShadow:'0 4px 20px rgba(34,197,94,0.4)',zIndex:100}},'🚨'),

    // Report detail modal
    selectedReport&&h(ReportDetailModal,{
      report:selectedReport,isAdmin,isRanger,user,
      onClose:()=>setSelectedReport(null),
      onVerify:()=>handleVerify(selectedReport.id),
      onDelete:()=>handleDelete(selectedReport.id),
      onEdit:()=>{setEditReport(selectedReport);setSelectedReport(null);},
    }),

    // Edit modal
    editReport&&h(ReportModal,{user,editReport,
      onClose:()=>setEditReport(null),
      onSuccess:(action)=>{toast.show(action==='updated'?'Report updated ✅':'Report submitted ✅');}
    }),

    toast.toast&&h(Toast,{key:toast.toast.key,...toast.toast,onDone:toast.clear})
  );
}

// ── ForestUpdatesPage ─────────────────────────────────────────────
function ForestUpdatesPage({user,isAdmin,isRanger}){
  const[updates,setUpdates]=useState([]);
  const[loading,setLoading]=useState(true);
  const[catFilter,setCatFilter]=useState(null);
  const[showPost,setShowPost]=useState(false);
  const[form,setForm]=useState({title:'',body:'',category:'conservation',district:'Statewide'});
  const[posting,setPosting]=useState(false);
  const toast=useToast();

  useEffect(()=>{
    if(!window.KV){setLoading(false);return;}
    setLoading(true);
    const unsub=window.KV.listenForestUpdates(items=>{setUpdates(items||[]);setLoading(false);},catFilter);
    return()=>{if(unsub)unsub();};
  },[catFilter]);

  async function handlePost(){
    if(!form.title.trim()||!form.body.trim()){toast.show('Title and body required','error');return;}
    if(!user){toast.show('Sign in to post','error');return;}
    setPosting(true);
    try{
      await window.KV.postForestUpdate(form,user);
      setForm({title:'',body:'',category:'conservation',district:'Statewide'});
      setShowPost(false);toast.show('Update posted ✅');
    }catch(e){toast.show(e.message,'error');}
    finally{setPosting(false);}
  }

  async function handleDelete(id){
    if(!confirm('Delete this update?'))return;
    try{await window.KV.deleteForestUpdate(id,user?.uid);toast.show('Deleted');}
    catch(e){toast.show(e.message,'error');}
  }

  return h('div',{style:{padding:'16px 16px 90px'}},
    h('div',{style:{display:'flex',alignItems:'center',marginBottom:4}},
      h('h2',{style:{fontFamily:'Playfair Display,serif',fontSize:'22px',color:'var(--tx)',flex:1}},'🌲 Forest Updates'),
      (isAdmin||isRanger)&&h('button',{className:'kv-btn sm',onClick:()=>setShowPost(!showPost)},
        showPost?'✕ Cancel':'+ Post')
    ),
    h('p',{style:{fontSize:'12px',color:'var(--tx3)',marginBottom:14}},"Live news from Karnataka's forests"),

    // Post form (admin only)
    showPost&&h('div',{style:{background:'rgba(15,77,40,0.3)',border:'1px solid rgba(34,197,94,0.2)',
      borderRadius:14,padding:16,marginBottom:16}},
      h('input',{className:'kv-input',placeholder:'Update title',style:{marginBottom:8},
        value:form.title,onChange:e=>setForm(f=>({...f,title:e.target.value}))}),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}},
        h('select',{className:'kv-input',value:form.category,onChange:e=>setForm(f=>({...f,category:e.target.value}))},
          FOREST_CATEGORIES.map(c=>h('option',{key:c.id,value:c.id},c.emoji+' '+c.label))),
        h('select',{className:'kv-input',value:form.district,onChange:e=>setForm(f=>({...f,district:e.target.value}))},
          h('option',{value:'Statewide'},'Statewide'),
          DISTRICTS.map(d=>h('option',{key:d,value:d},d)))
      ),
      h('textarea',{className:'kv-input',placeholder:'Update body…',style:{marginBottom:10},
        value:form.body,onChange:e=>setForm(f=>({...f,body:e.target.value}))}),
      h('button',{className:'kv-btn',onClick:handlePost,disabled:posting,
        style:{display:'flex',alignItems:'center',gap:8}},
        posting&&h(Spinner,{size:16}),posting?'Posting…':'📤 Post Update')
    ),

    // Category tabs
    h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}},
      [{id:null,label:'All',emoji:'🌿'},...FOREST_CATEGORIES].map(c=>h('button',{
        key:c.id||'all',onClick:()=>setCatFilter(c.id),
        style:{padding:'5px 10px',borderRadius:16,fontSize:'11px',cursor:'pointer',border:'none',
          background:catFilter===c.id?'rgba(34,197,94,0.2)':'rgba(255,255,255,0.05)',
          color:catFilter===c.id?'#22c55e':'var(--tx3)'}},c.emoji,' ',c.label))
    ),

    loading
      ? h('div',{style:{display:'flex',justifyContent:'center',padding:40}},h(Spinner,{size:32}))
      : updates.length===0
        ? h('div',{style:{textAlign:'center',padding:'40px 20px',color:'var(--tx3)'}},
            h('p',{},'No updates yet.'))
        : updates.map(u=>{
            const cat=FOREST_CATEGORIES.find(c=>c.id===u.category)||FOREST_CATEGORIES[0];
            return h('div',{key:u.id,style:{background:'rgba(15,77,40,0.2)',border:'1px solid rgba(34,197,94,0.12)',
              borderRadius:14,padding:14,marginBottom:10,animation:'fadeIn 0.3s ease'}},
              h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:8}},
                h('span',{style:{background:'rgba(34,197,94,0.1)',border:'1px solid rgba(34,197,94,0.2)',
                  borderRadius:6,padding:'2px 8px',fontSize:'10px',color:'#22c55e'}},
                  cat.emoji+' '+cat.label),
                h('span',{style:{fontSize:'10px',color:'var(--tx3)',marginLeft:'auto'}},
                  '📍 '+u.district),
                h('span',{style:{fontSize:'10px',color:'var(--tx3)',marginLeft:8}},
                  timeAgo(u.createdAt)),
                isAdmin&&h('button',{onClick:()=>handleDelete(u.id),
                  style:{background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:'14px',marginLeft:6}},'×')
              ),
              h('h3',{style:{fontSize:'15px',fontWeight:600,color:'var(--tx)',marginBottom:6}},u.title),
              h('p',{style:{fontSize:'13px',color:'var(--tx2)',lineHeight:'1.6'}},u.body),
              h('p',{style:{fontSize:'11px',color:'var(--tx3)',marginTop:8}},'by '+u.authorName)
            );
          }),
    toast.toast&&h(Toast,{key:toast.toast.key,...toast.toast,onDone:toast.clear})
  );
}

// ── LearningModuleReader ──────────────────────────────────────────
function LearningModuleReader({module:m,user,onClose,progress,onProgressUpdate}){
  const[readPct,setReadPct]=useState(progress||0);
  const contentRef=useRef();
  const toast=useToast();

  useEffect(()=>{
    const el=contentRef.current;
    if(!el)return;
    const onScroll=()=>{
      const pct=Math.round((el.scrollTop/(el.scrollHeight-el.clientHeight))*100);
      if(pct>readPct){
        setReadPct(pct);
        if(window.KV&&user)
          window.KV.markProgress(user.uid,m.id,pct).catch(()=>{});
        if(pct>=90)onProgressUpdate?.(m.id,100);
        else onProgressUpdate?.(m.id,pct);
      }
    };
    el.addEventListener('scroll',onScroll);
    return()=>el.removeEventListener('scroll',onScroll);
  },[m.id,user,readPct]);

  const diffColor={beginner:'#22c55e',intermediate:'#eab308',advanced:'#ef4444'};
  const dc=diffColor[m.difficulty]||'#22c55e';

  return h('div',{className:'modal-overlay',onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{className:'modal-sheet',ref:contentRef,style:{paddingBottom:60}},
      // Top bar
      h('div',{style:{position:'sticky',top:-24,background:'#061a0c',
        paddingTop:24,paddingBottom:12,marginTop:-24,zIndex:10}},
        h('div',{style:{width:40,height:4,background:'rgba(255,255,255,0.15)',borderRadius:2,margin:'0 auto 16px'}}),
        h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:8}},
          h('span',{style:{fontSize:28}},m.emoji||'📚'),
          h('div',{style:{flex:1}},
            h('h2',{style:{fontFamily:'Playfair Display,serif',fontSize:'18px',color:'var(--tx)',lineHeight:'1.3'}},m.title),
            h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginTop:4}},
              h('span',{style:{fontSize:'10px',color:dc,background:`${dc}22`,border:`1px solid ${dc}44`,
                borderRadius:20,padding:'2px 8px'}},capFirst(m.difficulty)),
              h('span',{style:{fontSize:'10px',color:'var(--tx3)'}},fmtDuration(m.duration)),
              m.district&&m.district!=='Statewide'&&h('span',{style:{fontSize:'10px',color:'var(--tx3)'}},
                '📍 '+m.district)
            )
          ),
          h('button',{onClick:onClose,style:{background:'none',border:'none',color:'var(--tx3)',
            fontSize:20,cursor:'pointer',padding:4}},'×')
        ),
        // Progress bar
        h('div',{className:'progress-bar-wrap'},
          h('div',{className:'progress-bar',style:{width:readPct+'%'}}))
      ),

      // Tags
      m.tags&&m.tags.length>0&&h('div',{style:{marginBottom:16}},
        m.tags.map(t=>h('span',{key:t,className:'tag-chip'},t))
      ),

      // Main content
      h('div',{style:{fontSize:'14px',color:'var(--tx2)',lineHeight:'1.8',marginBottom:24}},
        m.content.split('\n').filter(Boolean).map((para,i)=>
          h('p',{key:i,style:{marginBottom:12}},para))
      ),

      // Facts section
      m.facts&&m.facts.length>0&&h('div',{style:{marginBottom:20}},
        h('h3',{style:{fontFamily:'Playfair Display,serif',fontSize:'17px',color:'var(--tx)',marginBottom:12}},
          '🔍 Did You Know?'),
        m.facts.map((fact,i)=>h('div',{key:i,className:'fact-card'},
          h('p',{style:{fontSize:'13px',color:'var(--tx2)',lineHeight:'1.6'}},fact)))
      ),

      // Tags footer
      h('div',{style:{borderTop:'1px solid rgba(34,197,94,0.1)',paddingTop:16,marginTop:8,
        display:'flex',gap:8,alignItems:'center',justifyContent:'space-between'}},
        h('span',{style:{fontSize:'11px',color:'var(--tx3)'}},
          readPct>=90?'✅ Completed!':'📖 '+readPct+'% read'),
        h('button',{className:'kv-btn ghost sm',onClick:onClose},'← Back')
      ),

      toast.toast&&h(Toast,{key:toast.toast.key,...toast.toast,onDone:toast.clear})
    )
  );
}

// ── AdminModuleEditor ─────────────────────────────────────────────
function AdminModuleEditor({module:m,user,onClose,onSaved}){
  const[form,setForm]=useState(m?{...m,tags:(m.tags||[]).join(', '),facts:(m.facts||[]).join('\n')}:{
    title:'',summary:'',content:'',category:'wildlife',difficulty:'beginner',
    duration:5,emoji:'📚',tags:'',facts:'',district:'Statewide',
    featured:false,published:true,sortOrder:99,
  });
  const[saving,setSaving]=useState(false);
  const toast=useToast();
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  async function handleSave(){
    if(!form.title.trim()||!form.content.trim()){toast.show('Title and content required','error');return;}
    setSaving(true);
    try{
      const payload={
        ...form,
        tags:form.tags.split(',').map(t=>t.trim()).filter(Boolean),
        facts:form.facts.split('\n').map(t=>t.trim()).filter(Boolean),
        duration:Number(form.duration)||5,
        sortOrder:Number(form.sortOrder)||99,
      };
      const id=await window.KV.saveLearningModule(payload,user,m?.id||null);
      onSaved?.(id);toast.show(m?'Module updated ✅':'Module created ✅');onClose();
    }catch(e){toast.show(e.message||'Failed','error');}
    finally{setSaving(false);}
  }

  const LabelInput=(label,field,type='text',placeholder='')=>
    h('div',{style:{marginBottom:10}},
      h('label',{style:{fontSize:'12px',color:'var(--tx3)',display:'block',marginBottom:4}},label),
      type==='textarea'
        ? h('textarea',{className:'kv-input',placeholder,rows:4,value:form[field]||'',
            onChange:e=>set(field,e.target.value)})
        : type==='checkbox'
          ? h('label',{style:{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}},
              h('input',{type:'checkbox',checked:!!form[field],
                onChange:e=>set(field,e.target.checked),
                style:{width:16,height:16,accentColor:'#22c55e'}}),
              h('span',{style:{fontSize:'13px',color:'var(--tx2)'}},placeholder))
          : h('input',{className:'kv-input',type,placeholder,value:form[field]||'',
              onChange:e=>set(field,e.target.value)})
    );

  return h('div',{className:'modal-overlay',onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{className:'modal-sheet'},
      h('div',{style:{width:40,height:4,background:'rgba(255,255,255,0.15)',borderRadius:2,margin:'0 auto 20px'}}),
      h('h2',{style:{fontFamily:'Playfair Display,serif',fontSize:'20px',color:'var(--tx)',marginBottom:16}},
        m?'✏️ Edit Learning Module':'➕ New Learning Module'),
      LabelInput('Title','title','text','Module title…'),
      LabelInput('Summary (card preview)','summary','text','One-line summary…'),
      LabelInput('Emoji Icon','emoji','text','📚'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}},
        h('div',null,
          h('label',{style:{fontSize:'12px',color:'var(--tx3)',display:'block',marginBottom:4}},'Category'),
          h('select',{className:'kv-input',value:form.category||'wildlife',
            onChange:e=>set('category',e.target.value)},
            LEARN_CATEGORIES.filter(c=>c.id).map(c=>h('option',{key:c.id,value:c.id},c.label)))),
        h('div',null,
          h('label',{style:{fontSize:'12px',color:'var(--tx3)',display:'block',marginBottom:4}},'Difficulty'),
          h('select',{className:'kv-input',value:form.difficulty||'beginner',
            onChange:e=>set('difficulty',e.target.value)},
            ['beginner','intermediate','advanced'].map(d=>h('option',{key:d,value:d},capFirst(d)))))
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}},
        h('div',null,
          h('label',{style:{fontSize:'12px',color:'var(--tx3)',display:'block',marginBottom:4}},'Duration (min)'),
          h('input',{className:'kv-input',type:'number',value:form.duration||5,
            onChange:e=>set('duration',e.target.value)})),
        h('div',null,
          h('label',{style:{fontSize:'12px',color:'var(--tx3)',display:'block',marginBottom:4}},'Sort Order'),
          h('input',{className:'kv-input',type:'number',value:form.sortOrder||99,
            onChange:e=>set('sortOrder',e.target.value)})),
        h('div',null,
          h('label',{style:{fontSize:'12px',color:'var(--tx3)',display:'block',marginBottom:4}},'District'),
          h('select',{className:'kv-input',value:form.district||'Statewide',
            onChange:e=>set('district',e.target.value)},
            h('option',{value:'Statewide'},'Statewide'),
            DISTRICTS.map(d=>h('option',{key:d,value:d},d))))
      ),
      LabelInput('Full Content','content','textarea','Full article content (paragraphs separated by newlines)…'),
      LabelInput('Tags (comma separated)','tags','text','Tiger, Big Cats, Bandipur…'),
      LabelInput('Wildlife Facts (one per line)','facts','textarea','Interesting facts about this topic…'),
      h('div',{style:{display:'flex',gap:16,marginBottom:16}},
        LabelInput('','featured','checkbox','⭐ Featured module'),
        LabelInput('','published','checkbox','✅ Published')
      ),
      h('button',{className:'kv-btn',onClick:handleSave,disabled:saving,
        style:{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:8}},
        saving&&h(Spinner,{size:18}),saving?'Saving…':'💾 Save Module'),
      h('div',{style:{marginTop:8}}),
      toast.toast&&h(Toast,{key:toast.toast.key,...toast.toast,onDone:toast.clear})
    )
  );
}

// ── LearningPage (main) ────────────────────────────────────────────
function LearningPage({user,isAdmin}){
  const[modules,setModules]=useState([]);
  const[loading,setLoading]=useState(true);
  const[catFilter,setCatFilter]=useState(null);
  const[search,setSearch]=useState('');
  const[selectedModule,setSelectedModule]=useState(null);
  const[editModule,setEditModule]=useState(null);
  const[showCreate,setShowCreate]=useState(false);
  const[progress,setProgress]=useState({});
  const[bookmarks,setBookmarks]=useState([]);
  const[showBookmarks,setShowBookmarks]=useState(false);
  const[factIdx,setFactIdx]=useState(Math.floor(Math.random()*WILDLIFE_FACTS.length));
  const toast=useToast();

  useEffect(()=>{
    if(!window.KV){setLoading(false);return;}
    const f=catFilter?{category:catFilter}:{};
    setLoading(true);
    const unsub=window.KV.listenLearningModules(items=>{
      setModules(items||[]);setLoading(false);
    },f);
    return()=>{if(unsub)unsub();};
  },[catFilter]);

  useEffect(()=>{
    if(!user||!window.KV)return;
    window.KV.getUserProgress(user.uid).then(p=>setProgress(p||{})).catch(()=>{});
    // Load bookmarks from profile
    (async()=>{
      try{
        const snap=await window.KV.getDoc(window.KV.doc(window.KV.db,"users",user.uid));
        if(snap.exists())setBookmarks(snap.data().bookmarks||[]);
      }catch{}
    })();
  },[user]);

  // Rotate facts
  useEffect(()=>{
    const t=setInterval(()=>setFactIdx(i=>(i+1)%WILDLIFE_FACTS.length),6000);
    return()=>clearInterval(t);
  },[]);

  const filtered=useMemo(()=>{
    let list=modules.filter(m=>m.published!==false);
    if(showBookmarks)list=list.filter(m=>bookmarks.includes(m.id));
    if(search.trim()){
      const q=search.toLowerCase();
      list=list.filter(m=>
        m.title?.toLowerCase().includes(q)||m.summary?.toLowerCase().includes(q)||
        m.category?.toLowerCase().includes(q)||(m.tags||[]).some(t=>t.toLowerCase().includes(q))
      );
    }
    return list;
  },[modules,search,showBookmarks,bookmarks]);

  const featured=filtered.filter(m=>m.featured);
  const inProgress=filtered.filter(m=>progress[m.id]>0&&progress[m.id]<90);
  const completed=filtered.filter(m=>progress[m.id]>=90);

  function handleProgressUpdate(moduleId,pct){
    setProgress(p=>({...p,[moduleId]:pct}));
  }

  async function handleBookmark(moduleId){
    if(!user){toast.show('Sign in to bookmark modules','error');return;}
    const isBookmarked=bookmarks.includes(moduleId);
    try{
      const updated=await window.KV.toggleBookmark(user.uid,moduleId,isBookmarked);
      setBookmarks(updated);
      toast.show(isBookmarked?'Removed from bookmarks':'Bookmarked! 🔖');
    }catch(e){toast.show(e.message||'Failed','error');}
  }

  async function handleDeleteModule(id){
    if(!confirm('Delete this module?'))return;
    try{await window.KV.deleteLearningModule(id,user?.uid);toast.show('Module deleted');}
    catch(e){toast.show(e.message,'error');}
  }

  function ModuleCard({m,isCompact}){
    const pct=progress[m.id]||0;
    const isBookmarked=bookmarks.includes(m.id);
    const diffColor={beginner:'#22c55e',intermediate:'#eab308',advanced:'#ef4444'};
    const dc=diffColor[m.difficulty]||'#22c55e';
    return h('div',{className:'learn-card',
      style:{marginBottom:10,animationDelay:Math.random()*0.2+'s',
        position:'relative'}},
      // Bookmark button
      h('button',{
        onClick:e=>{e.stopPropagation();handleBookmark(m.id);},
        style:{position:'absolute',top:10,right:10,background:isBookmarked?'rgba(34,197,94,0.15)':'rgba(0,0,0,0.3)',
          border:'none',borderRadius:20,padding:'4px 8px',cursor:'pointer',fontSize:14,zIndex:1,
          transition:'all 0.2s'},title:isBookmarked?'Remove bookmark':'Bookmark'},
        isBookmarked?'🔖':'🤍'),
      h('div',{onClick:()=>setSelectedModule(m),style:{padding:'14px 14px 10px'}},
        h('div',{style:{display:'flex',gap:10,alignItems:'flex-start',marginBottom:10}},
          h('span',{style:{fontSize:28,flexShrink:0}},m.emoji||'📚'),
          h('div',{style:{flex:1,minWidth:0,paddingRight:32}},
            h('h3',{style:{fontSize:'14px',fontWeight:600,color:'var(--tx)',lineHeight:'1.4',marginBottom:4}},m.title),
            h('p',{style:{fontSize:'12px',color:'var(--tx2)',lineHeight:'1.4',
              overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}},
              m.summary||m.content?.slice(0,100)+'…')
          )
        ),
        h('div',{style:{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap',marginBottom:8}},
          h('span',{style:{fontSize:'10px',color:dc,background:`${dc}22`,border:`1px solid ${dc}33`,
            borderRadius:20,padding:'2px 7px'}},capFirst(m.difficulty||'beginner')),
          h('span',{style:{fontSize:'10px',color:'var(--tx3)'}},fmtDuration(m.duration||5)),
          m.featured&&h('span',{style:{fontSize:'10px',color:'#f59e0b',background:'rgba(245,158,11,0.15)',
            border:'1px solid rgba(245,158,11,0.3)',borderRadius:20,padding:'2px 7px'}},'⭐ Featured'),
          pct>=90&&h('span',{style:{fontSize:'10px',color:'#22c55e',background:'rgba(34,197,94,0.15)',
            border:'1px solid rgba(34,197,94,0.3)',borderRadius:20,padding:'2px 7px'}},'✅ Done'),
          m.district&&m.district!=='Statewide'&&h('span',{className:'tag-chip'},m.district)
        ),
        pct>0&&h('div',{style:{marginBottom:6}},
          h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:3}},
            h('span',{style:{fontSize:'10px',color:'var(--tx3)'}},'Progress'),
            h('span',{style:{fontSize:'10px',color:pct>=90?'#22c55e':'var(--tx3)'}},pct+'%')),
          h('div',{className:'progress-bar-wrap'},
            h('div',{className:'progress-bar',style:{width:pct+'%',
              background:pct>=90?'linear-gradient(90deg,#22c55e,#16a34a)':
                'linear-gradient(90deg,#eab308,#f59e0b)'}}))
        ),
        isAdmin&&h('div',{onClick:e=>e.stopPropagation(),style:{
          display:'flex',gap:6,paddingTop:6,borderTop:'1px solid rgba(255,255,255,0.06)'}},
          h('button',{className:'kv-btn ghost sm',onClick:()=>setEditModule(m),style:{flex:1,fontSize:'10px'}},'✏️ Edit'),
          h('button',{className:'kv-btn danger sm',onClick:()=>handleDeleteModule(m.id),style:{fontSize:'10px'}},'🗑')
        )
      )
    );
  }

  const Section=(title,list,showAll=false)=>{
    const[expanded,setExpanded]=useState(false);
    const visible=expanded||showAll?list:list.slice(0,4);
    if(!list||list.length===0)return null;
    return h('div',{style:{marginBottom:20}},
      h('div',{style:{display:'flex',alignItems:'center',marginBottom:10}},
        h('h3',{style:{fontFamily:'Playfair Display,serif',fontSize:'16px',color:'var(--tx)',flex:1}},title),
        list.length>4&&h('button',{onClick:()=>setExpanded(!expanded),
          style:{background:'none',border:'none',color:'var(--ga)',fontSize:'12px',cursor:'pointer'}},
          expanded?'Show less':'See all ('+list.length+')')
      ),
      visible.map(m=>h(ModuleCard,{key:m.id,m})),
    );
  };

  return h('div',{style:{padding:'12px 16px 90px'}},
    // Header
    h('div',{style:{display:'flex',alignItems:'center',marginBottom:6}},
      h('h2',{style:{fontFamily:'Playfair Display,serif',fontSize:'22px',color:'var(--tx)',flex:1}},'📚 Learning Hub'),
      isAdmin&&h('button',{className:'kv-btn sm',onClick:()=>setShowCreate(true)},'+ Module')
    ),
    h('p',{style:{fontSize:'12px',color:'var(--tx3)',marginBottom:14}},
      'Explore Karnataka\'s wildlife, biodiversity, and conservation'),

    // Rotating wildlife fact banner
    h('div',{key:factIdx,style:{
      background:'linear-gradient(135deg,rgba(34,197,94,0.12),rgba(10,46,24,0.6))',
      border:'1px solid rgba(34,197,94,0.2)',borderRadius:14,
      padding:'14px 16px',marginBottom:16,animation:'fadeInFast 0.4s ease',
    }},
      h('p',{style:{fontSize:'11px',color:'var(--ga)',fontWeight:600,marginBottom:4}},
        '🌿 Karnataka Wildlife Fact'),
      h('p',{style:{fontSize:'13px',color:'var(--tx2)',lineHeight:'1.5'}},
        WILDLIFE_FACTS[factIdx])
    ),

    // Search bar
    h('div',{className:'search-wrap',style:{marginBottom:12}},
      h('span',{className:'search-icon'},'🔍'),
      h('input',{className:'kv-input',type:'text',placeholder:'Search modules, topics, wildlife…',
        value:search,onChange:e=>setSearch(e.target.value)})
    ),

    // Category tabs + Bookmark filter
    h('div',{style:{overflowX:'auto',WebkitOverflowScrolling:'touch',marginBottom:14}},
      h('div',{style:{display:'flex',gap:6,paddingBottom:4,width:'max-content'}},
        LEARN_CATEGORIES.map(c=>h('button',{key:c.id||'all',onClick:()=>{setCatFilter(c.id);setShowBookmarks(false);},
          style:{padding:'5px 12px',borderRadius:20,fontSize:'11px',cursor:'pointer',border:'none',whiteSpace:'nowrap',
            background:!showBookmarks&&catFilter===c.id?'rgba(34,197,94,0.2)':'rgba(255,255,255,0.05)',
            color:!showBookmarks&&catFilter===c.id?'#22c55e':'var(--tx3)'}},c.emoji,' ',c.label)),
        user&&h('button',{onClick:()=>{setShowBookmarks(!showBookmarks);setCatFilter(null);},
          style:{padding:'5px 12px',borderRadius:20,fontSize:'11px',cursor:'pointer',border:'none',whiteSpace:'nowrap',
            background:showBookmarks?'rgba(34,197,94,0.2)':'rgba(255,255,255,0.05)',
            color:showBookmarks?'#22c55e':'var(--tx3)'}},
          '🔖 Bookmarks',bookmarks.length>0&&` (${bookmarks.length})`)
      )
    ),

    loading
      ? h('div',{style:{display:'flex',justifyContent:'center',padding:40}},h(Spinner,{size:32}))
      : filtered.length===0
        ? h('div',{style:{textAlign:'center',padding:'40px 20px',color:'var(--tx3)'}},
            h('div',{style:{fontSize:48,marginBottom:12}},'📚'),
            h('p',{style:{fontSize:'14px'}},
              search?'No modules match your search.':
              showBookmarks?'No bookmarks yet. Tap 🤍 on any module!':
              'No modules yet.'))
        : h('div',null,
            // Progress section
            !search&&!showBookmarks&&inProgress.length>0&&Section('📖 Continue Learning',inProgress,false),
            // Featured
            !search&&!showBookmarks&&featured.length>0&&Section('⭐ Featured',featured,false),
            // All / filtered
            Section(search?`Results for "${search}"`:showBookmarks?'🔖 Bookmarked':catFilter?
              (LEARN_CATEGORIES.find(c=>c.id===catFilter)?.label||'Modules'):
              'All Modules',
              search||showBookmarks||catFilter?filtered:
              filtered.filter(m=>!m.featured&&(progress[m.id]||0)<90),true),
            // Completed
            !search&&!showBookmarks&&completed.length>0&&Section('✅ Completed',completed,false),
          ),

    // Stats strip
    user&&!loading&&h('div',{style:{
      background:'rgba(15,77,40,0.2)',border:'1px solid rgba(34,197,94,0.1)',
      borderRadius:14,padding:'14px 16px',marginTop:4}},
      h('p',{style:{fontSize:'13px',fontWeight:600,color:'var(--tx)',marginBottom:8}},
        '📊 Your Progress'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}},
        [
          {label:'Modules Started',val:Object.keys(progress).length,icon:'📖'},
          {label:'Completed',val:completed.length,icon:'✅'},
          {label:'Bookmarks',val:bookmarks.length,icon:'🔖'},
        ].map(s=>h('div',{key:s.label,style:{textAlign:'center',background:'rgba(34,197,94,0.05)',
          borderRadius:10,padding:10}},
          h('div',{style:{fontSize:20,marginBottom:2}},s.icon),
          h('div',{style:{fontSize:'18px',fontWeight:700,color:'#22c55e'}},s.val),
          h('div',{style:{fontSize:'9px',color:'var(--tx3)',marginTop:1}},s.label)
        ))
      )
    ),

    // Module reader modal
    selectedModule&&h(LearningModuleReader,{
      module:selectedModule,user,
      progress:progress[selectedModule.id]||0,
      onProgressUpdate:handleProgressUpdate,
      onClose:()=>setSelectedModule(null),
    }),

    // Module editor modal
    (editModule||showCreate)&&h(AdminModuleEditor,{
      module:editModule||null,user,
      onClose:()=>{setEditModule(null);setShowCreate(false);},
      onSaved:()=>{setEditModule(null);setShowCreate(false);},
    }),

    toast.toast&&h(Toast,{key:toast.toast.key,...toast.toast,onDone:toast.clear})
  );
}

// ADMIN DASHBOARD

function AdminDashboard({user,isAdmin}){
  const[stats,setStats]=useState({total:0,active:0,verified:0,critical:0,pending:0,districts:[]});
  const[reports,setReports]=useState([]);
  const[alerts,setAlerts]=useState([]);

    title:'',message:'',priority:'high',district:'Statewide',animalEmoji:'⚠️',expiryHours:12
  });
  const[sending,setSending]=useState(false);
  const[tab,setTab]=useState('overview');
  const[editReport,setEditReport]=useState(null);
  const toast=useToast();

  useEffect(()=>{
    if(!window.KV||!isAdmin)return;
    const u1=window.KV.listenDashboardStats(setStats);
    const u2=window.KV.listenReports({limitCount:20},(items)=>setReports(items||[]));
    const u3=window.KV.listenAlerts(setAlerts);
    return()=>{u1?.();u2?.();u3?.();};
  },[isAdmin]);

  async function sendAlert(){
    if(!alertForm.title||!alertForm.message){toast.show('Title and message required','error');return;}
    setSending(true);
    try{
      await window.KV.createAlert(alertForm,user);
      setAlertForm({title:'',message:'',priority:'high',district:'Statewide',animalEmoji:'⚠️',expiryHours:12});
      toast.show('Alert sent! 🚨');
    }catch(e){toast.show(e.message,'error');}
    finally{setSending(false);}

  if(!isAdmin)return h('div',{style:{padding:40,textAlign:'center',color:'var(--tx3)'}},
    h('div',{style:{fontSize:48,marginBottom:12}},'🔒'),
    h('h3',{style:{color:'var(--tx)',marginBottom:8}},'Admin Access Only'),
    h('p',{style:{fontSize:'13px',lineHeight:'1.6'}},
      'This panel is restricted to verified Karnataka Forest Department staff.\nOnly ',
      h('strong',{style:{color:'var(--ga)'}},window.KV?.ADMIN_EMAIL||'the designated admin'),
