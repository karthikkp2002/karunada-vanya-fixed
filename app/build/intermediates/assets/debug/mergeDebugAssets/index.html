  const statItems=[
    {label:'Total Reports',val:stats.total,icon:'📊',color:'#22c55e'},
    {label:'Active',      val:stats.active, icon:'🟢',color:'#22c55e'},
    {label:'Verified',    val:stats.verified,icon:'✅',color:'#22c55e'},
    {label:'Critical',    val:stats.critical,icon:'🔴',color:'#ef4444'},
    {label:'Pending',     val:stats.pending, icon:'⏳',color:'#eab308'},
    {label:'Live Alerts', val:alerts.length, icon:'🚨',color:'#f97316'},
  ];

  const tabStyle=(t)=>({
    padding:'6px 14px',borderRadius:20,fontSize:'12px',cursor:'pointer',border:'none',
    background:tab===t?'rgba(34,197,94,0.2)':'transparent',
    color:tab===t?'#22c55e':'var(--tx3)',fontWeight:tab===t?600:400,
  });

  return h('div',{style:{padding:'0 16px 90px'}},
    h('h2',{style:{fontFamily:'Playfair Display,serif',fontSize:'22px',color:'var(--tx)',padding:'20px 0 4px'}},'🛡️ Admin Dashboard'),
    h('p',{style:{fontSize:'11px',color:'var(--tx3)',marginBottom:14}},'Signed in as '+user?.email),

    // Tabs
    h('div',{style:{display:'flex',gap:4,marginBottom:16,flexWrap:'wrap',
      background:'rgba(255,255,255,0.03)',borderRadius:12,padding:4}},
      h('button',{style:tabStyle('overview'),onClick:()=>setTab('overview')},'📊 Overview'),
      h('button',{style:tabStyle('reports'), onClick:()=>setTab('reports')},'📋 Reports'),
      h('button',{style:tabStyle('districts'),onClick:()=>setTab('districts')},'🗺️ Districts'),
      h('button',{style:tabStyle('alerts'),  onClick:()=>setTab('alerts')},'🚨 Alerts'),
    ),

    // ── Overview ──
    tab==='overview'&&h('div',null,
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:20}},
        statItems.map(s=>h('div',{key:s.label,className:'stat-card'},
          h('div',{style:{fontSize:18,marginBottom:4}},s.icon),
          h('div',{className:'stat-num',style:{color:s.color}},s.val),
          h('div',{className:'stat-label'},s.label)))
      ),
      // Recent activity
      h('div',{style:{marginBottom:20}},
        h('h3',{style:{fontSize:'15px',color:'var(--tx)',marginBottom:10}},'📝 Recent Reports'),
        reports.slice(0,5).map(r=>h('div',{key:r.id,style:{
          display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
          background:'rgba(255,255,255,0.04)',borderRadius:10,marginBottom:6}},
          h('span',{style:{fontSize:18}},r.animalEmoji||'🐾'),
          h('div',{style:{flex:1}},
            h('p',{style:{fontSize:'13px',fontWeight:600,color:'var(--tx)'}},r.animalName),
            h('p',{style:{fontSize:'11px',color:'var(--tx3)'}},r.district+' · '+timeAgo(r.createdAt))),
          h('span',{style:{fontSize:'10px',
            color:r.severity==='critical'?'#ef4444':r.severity==='high'?'#f97316':'var(--tx3)',
            fontWeight:600}},r.severity?.toUpperCase()),
          !r.verified&&h('button',{className:'kv-btn sm',
            onClick:()=>window.KV.adminUpdateReport(r.id,{verified:true,status:'active'},user?.uid).catch(()=>{}),
            style:{padding:'4px 8px',fontSize:'10px'}},'✅')
        ))
      )
    ),

    // ── Reports ──
    tab==='reports'&&h('div',null,
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}},
        h('p',{style:{fontSize:'13px',color:'var(--tx2)'}},'Showing most recent 20 reports'),
        h('button',{className:'kv-btn ghost sm',onClick:()=>window.KV.exportCSV(reports)},'📥 Export CSV')
      ),
      reports.map(r=>h(ReportCard,{key:r.id,report:r,isAdmin:true,isRanger:true,user,
        onClick:()=>{},
        onVerify:e=>{e.stopPropagation();window.KV.adminUpdateReport(r.id,{verified:true,status:'active'},user?.uid).then(()=>toast.show('✅ Verified')).catch(e=>toast.show(e.message,'error'));},
        onDelete:e=>{e.stopPropagation();confirm('Delete?')&&window.KV.deleteReport(r.id,user?.uid).then(()=>toast.show('Deleted')).catch(()=>{});},
        onEdit:e=>{e.stopPropagation();setEditReport(r);},
      }))
    ),

    // ── Districts ──
    tab==='districts'&&h('div',null,
      h('p',{style:{fontSize:'12px',color:'var(--tx3)',marginBottom:12}},
        `Breakdown from ${stats.total} reports across districts`),
      stats.districts.length===0
        ? h('p',{style:{color:'var(--tx3)',fontSize:'13px',textAlign:'center',padding:40}},'No data yet.')
        : stats.districts.map(d=>h('div',{key:d.district,className:'district-card'},
            h('div',{style:{width:40,height:40,borderRadius:10,background:'rgba(34,197,94,0.1)',
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}},'📍'),
            h('div',{style:{flex:1,minWidth:0}},
              h('p',{style:{fontWeight:600,fontSize:'14px',color:'var(--tx)',marginBottom:4}},d.district),
              h('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
                h('span',{style:{fontSize:'11px',color:'var(--tx3)'}},`${d.total} total`),
                d.critical>0&&h('span',{style:{fontSize:'11px',color:'#ef4444'}},`${d.critical} critical`),
                d.active>0&&h('span',{style:{fontSize:'11px',color:'#22c55e'}},`${d.active} active`),
                d.verified>0&&h('span',{style:{fontSize:'11px',color:'#60a5fa'}},`${d.verified} verified`)
              ),
              d.animals.length>0&&h('p',{style:{fontSize:'10px',color:'var(--tx3)',marginTop:3}},
                d.animals.slice(0,4).join(' · ')+(d.animals.length>4?` +${d.animals.length-4} more`:''))
            ),
            h('div',{style:{background:'rgba(239,68,68,0.12)',color:'#f87171',
              borderRadius:8,padding:'4px 10px',fontSize:'13px',fontWeight:700,flexShrink:0}},d.total)
          ))
    ),

    // ── Alerts ──
    tab==='alerts'&&h('div',null,
      // Send alert form
      h('div',{style:{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.25)',
        borderRadius:16,padding:16,marginBottom:20}},
        h('h3',{style:{fontSize:'16px',color:'#fca5a5',marginBottom:14}},'🚨 Send Emergency Alert'),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}},
          h('input',{className:'kv-input',placeholder:'Alert title *',value:alertForm.title,
            onChange:e=>setAlertForm(f=>({...f,title:e.target.value}))}),
          h('select',{className:'kv-input',value:alertForm.priority,
            onChange:e=>setAlertForm(f=>({...f,priority:e.target.value}))},
            ['critical','high','medium','low'].map(p=>h('option',{key:p,value:p},capFirst(p))))
        ),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}},
          h('select',{className:'kv-input',value:alertForm.district,
            onChange:e=>setAlertForm(f=>({...f,district:e.target.value}))},
            h('option',{value:'Statewide'},'Statewide'),
            DISTRICTS.map(d=>h('option',{key:d,value:d},d))),
          h('select',{className:'kv-input',value:alertForm.expiryHours,
            onChange:e=>setAlertForm(f=>({...f,expiryHours:Number(e.target.value)}))},
            [6,12,24,48,72].map(n=>h('option',{key:n,value:n},`Expires in ${n}h`)))
        ),
        h('textarea',{className:'kv-input',
          placeholder:'Alert message — describe location, risk, and recommended action.',
          style:{marginBottom:10},value:alertForm.message,
          onChange:e=>setAlertForm(f=>({...f,message:e.target.value}))}),
        h('button',{className:'kv-btn danger',onClick:sendAlert,disabled:sending,
          style:{display:'flex',alignItems:'center',gap:8,width:'100%',justifyContent:'center'}},
          sending&&h(Spinner,{size:16}),sending?'Sending…':'🚨 Broadcast Alert')
      ),

      // Active alerts list
      alerts.length>0
        ? h('div',null,
            h('h3',{style:{fontSize:'14px',color:'var(--tx)',marginBottom:10}},
              `Active Alerts (${alerts.length})`),
            alerts.map(a=>h('div',{key:a.id,style:{
              background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',
              borderRadius:10,padding:'12px 14px',marginBottom:8,display:'flex',alignItems:'center',gap:10}},
              h('span',{style:{fontSize:18}},a.animalEmoji||'⚠️'),
              h('div',{style:{flex:1}},
                h('p',{style:{fontSize:'13px',fontWeight:600,color:'var(--tx)'}},a.title,
                  h('span',{style:{fontSize:'10px',color:'#f87171',fontWeight:'normal',marginLeft:6}},
                    capFirst(a.priority))),
                h('p',{style:{fontSize:'11px',color:'var(--tx3)'}},
                  a.district+' · '+timeAgo(a.createdAt)),
                a.message&&h('p',{style:{fontSize:'11px',color:'var(--tx2)',marginTop:2}},a.message)
              ),
              h('button',{className:'kv-btn ghost sm',
                onClick:()=>window.KV.resolveAlert(a.id,user?.uid).then(()=>toast.show('Alert resolved')).catch(()=>{}),
              },'Resolve')
            ))
          )
        : h('div',{style:{textAlign:'center',padding:'20px',color:'var(--tx3)'}},
            h('p',{style:{fontSize:'13px'}},'No active alerts'))
    ),

    // Edit report modal
    editReport&&h(ReportModal,{user,editReport,
      onClose:()=>setEditReport(null),
      onSuccess:()=>{setEditReport(null);toast.show('Report updated ✅');},
    }),

    toast.toast&&h(Toast,{key:toast.toast.key,...toast.toast,onDone:toast.clear})
  );
}

// ══════════════════════════════════════════════════════════════════
// HOME PAGE
// ══════════════════════════════════════════════════════════════════
function HomePage({setPage,alerts,onReport,user}){
  const active=alerts.filter(a=>a.status!=='resolved');
  return h('div',{style:{padding:'16px 16px 90px'}},
    // Hero
    h('div',{style:{background:'linear-gradient(135deg,rgba(15,77,40,0.6),rgba(4,15,7,0.8))',
      border:'1px solid rgba(34,197,94,0.2)',borderRadius:20,
      padding:'28px 20px',textAlign:'center',marginBottom:20}},
      h('div',{style:{fontSize:52,marginBottom:10,animation:'float 3s ease-in-out infinite'}},'🌿'),
      h('h1',{style:{fontFamily:'Playfair Display,serif',fontSize:'26px',color:'var(--tx)',marginBottom:6}},
        'Karunada-Vanya'),
      h('p',{style:{fontSize:'13px',color:'var(--tx2)',marginBottom:4}},
        'ಕರುನಾಡ ವನ್ಯ — National Pride'),
      h('p',{style:{fontSize:'12px',color:'var(--tx3)',marginBottom:20}},
        'Karnataka Wildlife Awareness & Conflict Reporting Platform'),
      h('div',{style:{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}},
        h('button',{className:'kv-btn',onClick:onReport,
          style:{display:'flex',alignItems:'center',gap:6}},'🚨 Report Sighting'),
        h('button',{className:'kv-btn ghost',onClick:()=>setPage('reports')},'📋 View Reports'))
    ),

    // Alert strip
    active.length>0&&h('div',{style:{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',
      borderRadius:14,padding:'12px 16px',marginBottom:16,cursor:'pointer'},
      onClick:()=>setPage('reports')},
      h('p',{style:{fontSize:'12px',fontWeight:600,color:'#fca5a5',marginBottom:6}},
        `🔴 ${active.length} Active Wildlife Alert${active.length>1?'s':''}`),
      active.slice(0,2).map((a,i)=>h('p',{key:i,style:{fontSize:'11px',color:'#fca5a5',marginBottom:2}},
        (a.animalEmoji||'⚠️')+' '+a.title+' — '+a.district))
    ),

    // Quick stats
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:20}},
      [{emoji:'🐯',val:'300+',label:'Tigers in Karnataka'},
       {emoji:'🐘',val:'6,000+',label:'Elephants'},
       {emoji:'📋',val:'Live',label:'Reports Active'}]
      .map(s=>h('div',{key:s.label,style:{background:'rgba(15,77,40,0.2)',border:'1px solid rgba(34,197,94,0.15)',
        borderRadius:12,padding:'14px 8px',textAlign:'center'}},
        h('div',{style:{fontSize:24,marginBottom:4}},s.emoji),
        h('p',{style:{fontSize:'16px',fontWeight:700,color:'#22c55e',marginBottom:2}},s.val),
        h('p',{style:{fontSize:'10px',color:'var(--tx3)',lineHeight:'1.3'}},s.label)))
    ),

    // Nav cards
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}},
      [{icon:'📋',title:'Live Reports',desc:'Real-time wildlife sightings',page:'reports',color:'#ef4444'},
       {icon:'🌲',title:'Forest News',desc:'Updates from the forest',page:'forest',color:'#22c55e'},
       {icon:'📚',title:'Learn',desc:'Wildlife knowledge hub',page:'learn',color:'#818cf8'},
       {icon:'🚨',title:'Report Now',desc:'Submit a new sighting',page:'__report',color:'#f97316'}]
      .map(c=>h('div',{key:c.page,onClick:()=>c.page==='__report'?onReport():setPage(c.page),
        style:{background:`${c.color}11`,border:`1px solid ${c.color}33`,
          borderRadius:14,padding:'16px 14px',cursor:'pointer',transition:'all 0.2s'}},
        h('div',{style:{fontSize:26,marginBottom:8}},c.icon),
        h('p',{style:{fontSize:'13px',fontWeight:600,color:'var(--tx)',marginBottom:3}},c.title),
        h('p',{style:{fontSize:'11px',color:'var(--tx3)'}},c.desc)))
    ),

    // Emergency contacts
    h('div',{style:{background:'rgba(15,77,40,0.15)',border:'1px solid rgba(34,197,94,0.1)',
      borderRadius:14,padding:'14px 16px'}},
      h('p',{style:{fontSize:'12px',fontWeight:600,color:'var(--tx)',marginBottom:8}},
        '📞 Wildlife Emergency Contacts'),
      [{label:'Forest Helpline',num:'1926'},
       {label:'Wildlife Crime',num:'1800-103-1111'},
       {label:'Karnataka Forest',num:'080-2238-4374'}]
      .map(c=>h('div',{key:c.num,style:{display:'flex',justifyContent:'space-between',marginBottom:4}},
        h('span',{style:{fontSize:'12px',color:'var(--tx3)'}},c.label),
        h('a',{href:`tel:${c.num}`,style:{fontSize:'12px',color:'var(--ga)',fontWeight:600,textDecoration:'none'}},c.num)))
    )
  );
}

// ══════════════════════════════════════════════════════════════════
// ROOT APP
// ══════════════════════════════════════════════════════════════════
function App(){
  const[page,setPage]=useState('home');
  const[showReport,setShowReport]=useState(false);
  const[firestoreAlerts,setFirestoreAlerts]=useState([]);
  const toast=useToast();
  const online=useOnline();
  const{user,profile,authLoading,authError,signIn,signOut,isAdmin,isRanger}=useAuth();

  // Real-time emergency alerts
  useEffect(()=>{
    const poll=setInterval(()=>{
      if(window.KV){
        clearInterval(poll);
        clearTimeout(alertTimeout);
        const unsub=window.KV.listenAlerts(setFirestoreAlerts);
        window._kvAlertUnsub=unsub;
      }
    },200);
    // Safety timeout — stop polling if Firebase never loads after 10 s
    const alertTimeout=setTimeout(()=>{ clearInterval(poll); },10000);
    return()=>{clearInterval(poll);clearTimeout(alertTimeout);window._kvAlertUnsub?.();};
  },[]);

  function renderPage(){
    switch(page){
      case'home':    return h(HomePage,{setPage,alerts:firestoreAlerts,onReport:()=>setShowReport(true),user});
      case'reports': return h(LiveReportsPage,{user,isAdmin,isRanger,onReport:()=>setShowReport(true)});
      case'forest':  return h(ForestUpdatesPage,{user,isAdmin,isRanger});
      case'learn':   return h(LearningPage,{user,isAdmin});
      case'admin':   return h(AdminDashboard,{user,isAdmin});
      default:       return h(HomePage,{setPage,alerts:firestoreAlerts,onReport:()=>setShowReport(true),user});
    }
  }

  return h('div',{style:{background:'var(--gd)',minHeight:'100vh'}},
    !online&&h('div',{className:'offline-banner'},'⚠️ Offline — reports queued and will sync on reconnect.'),
    h(AuthHeader,{user,profile,authLoading,authError,signIn,signOut}),
    firestoreAlerts.length>0&&h(EmergencyBanner,{alerts:firestoreAlerts,onClick:()=>setPage('reports')}),
    h(NavBar,{page,setPage,alertCount:firestoreAlerts.length}),
    h('div',{className:'fade-in',key:page},renderPage()),
    h(BottomNav,{page,setPage,alertCount:firestoreAlerts.length,isAdmin}),
    showReport&&h(ReportModal,{user,
      onClose:()=>setShowReport(false),
      onSuccess:(action)=>{
        toast.show(action==='updated'?'Report updated ✅':'🐾 Report submitted — thank you for protecting Karnataka\'s wildlife!');
      }
    }),
    toast.toast&&h(Toast,{key:toast.toast.key,...toast.toast,onDone:toast.clear})
  );
}

// Mount
const root=ReactDOM.createRoot(document.getElementById('app-root'));
root.render(h(App,{}));
</script>
</body>
</html>
